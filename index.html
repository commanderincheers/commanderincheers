<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Justin Bieber Slideshow</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .slide {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .slide.active {
      opacity: 1;
    }

    .text {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      text-align: center;
      font-size: clamp(1.8rem, 6vw, 4rem);
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 20px black;
      z-index: 5;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 30px;
    }

    button {
      font-size: 1.2rem;
      padding: 14px 28px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 20px;
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>
  <div id="slide1" class="slide active"></div>
  <div id="slide2" class="slide"></div>

  <div class="text">
    forever in my Bieber era
  </div>

  <div class="start-screen" id="startScreen">
    <h1>Tap to Start</h1>
    <p>Slideshow + music</p>
    <button onclick="startSite()">Start</button>
  </div>

  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const searchTerm = "Justin Bieber";
    const slideDuration = 4000;

    let images = [];
    let currentIndex = 0;
    let showingFirst = true;

    async function fetchImages() {
      const url =
        "https://commons.wikimedia.org/w/api.php" +
        "?origin=*" +
        "&action=query" +
        "&generator=search" +
        "&gsrsearch=" + encodeURIComponent(searchTerm) +
        "&gsrnamespace=6" +
        "&gsrlimit=50" +
        "&prop=imageinfo" +
        "&iiprop=url" +
        "&format=json";

      const response = await fetch(url);
      const data = await response.json();

      if (!data.query || !data.query.pages) {
        throw new Error("No images found.");
      }

      images = Object.values(data.query.pages)
        .map(page => page.imageinfo?.[0]?.url)
        .filter(url =>
          url &&
          /\.(jpg|jpeg|png|webp)$/i.test(url) &&
          !url.toLowerCase().includes(".svg")
        );

      images = shuffle(images);

      if (images.length === 0) {
        throw new Error("No usable images found.");
      }
    }

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function showNextImage() {
      const slide1 = document.getElementById("slide1");
      const slide2 = document.getElementById("slide2");

      const nextImage = images[currentIndex];
      currentIndex = (currentIndex + 1) % images.length;

      if (currentIndex === 0) {
        images = shuffle(images);
      }

      if (showingFirst) {
        slide2.style.backgroundImage = `url('${nextImage}')`;
        slide2.classList.add("active");
        slide1.classList.remove("active");
      } else {
        slide1.style.backgroundImage = `url('${nextImage}')`;
        slide1.classList.add("active");
        slide2.classList.remove("active");
      }

      showingFirst = !showingFirst;
    }

    async function startSite() {
      document.getElementById("startScreen").style.display = "none";

      try {
        await fetchImages();

        document.getElementById("music").play();

        showNextImage();
        setInterval(showNextImage, slideDuration);
      } catch (error) {
        document.body.innerHTML = `
          <div style="color:white; padding:40px; text-align:center;">
            <h1>Could not load images</h1>
            <p>Try refreshing the page.</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
