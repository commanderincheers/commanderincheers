<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin Bieber Slideshow</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .slide {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .slide.active {
      opacity: 1;
    }

    .text {
      position: fixed;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      text-align: center;
      font-size: clamp(1.8rem, 6vw, 4rem);
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 20px black;
      z-index: 5;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 30px;
    }

    button {
      font-size: 1.2rem;
      padding: 14px 28px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 20px;
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>
  <div id="slide1" class="slide active"></div>
  <div id="slide2" class="slide"></div>

  <div class="text">
    forever in my Bieber era
  </div>

  <div class="start-screen" id="startScreen">
    <h1>Tap to Start</h1>
    <p>Slideshow + music</p>
    <button onclick="startSite()">Start</button>
  </div>

  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const slideDuration = 4000;

    let images = [
      "https://upload.wikimedia.org/wikipedia/commons/d/da/Justin_Bieber_in_2015.jpg",
      "https://upload.wikimedia.org/wikipedia/commons/1/1c/Justin_Bieber_2010_2.jpg",
      "https://upload.wikimedia.org/wikipedia/commons/5/58/Justin_Bieber_%2843534498360%29.jpg",
      "https://upload.wikimedia.org/wikipedia/commons/e/e8/Justin_Bieber_2012_NRJ_Music_Awards.jpg",
      "https://upload.wikimedia.org/wikipedia/commons/6/6f/Justin_Bieber_at_Rosemont_Theatre%2C_Chicago%2C_2009.jpg"
    ];

    let currentIndex = 0;
    let showingFirst = true;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function showNextImage() {
      const slide1 = document.getElementById("slide1");
      const slide2 = document.getElementById("slide2");

      const nextImage = images[currentIndex];
      currentIndex = (currentIndex + 1) % images.length;

      if (currentIndex === 0) {
        images = shuffle(images);
      }

      if (showingFirst) {
        slide2.style.backgroundImage = `url('${nextImage}')`;
        slide2.classList.add("active");
        slide1.classList.remove("active");
      } else {
        slide1.style.backgroundImage = `url('${nextImage}')`;
        slide1.classList.add("active");
        slide2.classList.remove("active");
      }

      showingFirst = !showingFirst;
    }

    function startSite() {
      document.getElementById("startScreen").style.display = "none";

      const music = document.getElementById("music");
      music.play().catch(() => {});

      images = shuffle(images);

      showNextImage();
      setInterval(showNextImage, slideDuration);
    }
  </script>
</body>
</html>>
